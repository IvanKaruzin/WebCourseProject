services:
  backend:
    build:
      context: ./movie_lib
    env_file: ./movie_lib/.env
    environment:
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      CORS_ALLOWED_ORIGINS: "http://localhost,http://127.0.0.1"
    volumes:
      - ./movie_lib/db.sqlite3:/app/db.sqlite3
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
